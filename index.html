<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实时温度</title>
<style>
    body{background:#f0f4ff;font-family:Arial;text-align:center;padding:50px 0}
    .box{background:white;max-width:320px;margin:0 auto;padding:30px;border-radius:16px;box-shadow:0 0 20px #00000010}
    .title{font-size:18px;color:#666;margin-bottom:10px}
    .temp{font-size:60px;font-weight:bold;color:#ff4444;margin:20px 0}
    .time{font-size:14px;color:#999}
    .status{font-size:12px;color:#09c;margin-top:10px}
</style>
</head>
<body>
<div class="box">
    <div class="title">当前温度</div>
    <div class="temp" id="val">-- ℃</div>
    <div class="time" id="time">更新时间：--</div>
    <div class="status" id="status">加载中...</div>
</div>

<script>
function get(){
    fetch("https://iot-api.heclouds.com/thingmodel/query-device-property?product_id=1o65Tk1pBp&device_name=esp32_01", {
        headers: {
            "authorization":"version=2022-05-01&res=userid%2F508269&et=1776162635&method=sha1&sign=7ZNtGIUVk%2FYIw3vOTmjork%2FPjeY%3D"
        }
    })
    .then(r=>r.json())
    .then(d=>{
        if(d.code===0 && d.data[0]){
            const t = d.data[0]
            document.getElementById('val').innerText = t.value + ' ℃'
            document.getElementById('time').innerText = '时间：' + new Date(t.time).toLocaleString()
            document.getElementById('status').innerText = '✅ 数据正常'
        }else{
            document.getElementById('status').innerText = '❌ 获取失败'
        }
    })
    .catch(e=>{
        document.getElementById('status').innerText = '⚠️ 网络异常'
    })
}
get()
setInterval(get, 3000)
</script>
</body>
</html>
